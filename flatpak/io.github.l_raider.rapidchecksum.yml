app-id: io.github.l_raider.rapidchecksum

runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: rapidchecksum

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Users hash files from anywhere in their home directory
  - --filesystem=home

build-options:
  # Make the Rust toolchain visible to the build system
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_NET_OFFLINE: 'true'

modules:
  - name: rapidchecksum
    buildsystem: simple
    build-commands:
      # Inject the vendor config so cargo finds all crates without the internet.
      - mkdir -p .cargo
      - cp flatpak/cargo-vendor-config.toml .cargo/config.toml
      - cargo --offline build --release
      - install -Dm755 target/release/rapidchecksum /app/bin/rapidchecksum
      - install -Dm644 flatpak/io.github.l_raider.rapidchecksum.desktop /app/share/applications/io.github.l_raider.rapidchecksum.desktop
      - install -Dm644 flatpak/io.github.l_raider.rapidchecksum-mime.xml /app/share/mime/packages/io.github.l_raider.rapidchecksum-mime.xml
      - install -Dm644 flatpak/io.github.l_raider.rapidchecksum.metainfo.xml /app/share/metainfo/io.github.l_raider.rapidchecksum.metainfo.xml
      - install -Dm644 flatpak/icons/hicolor/scalable/apps/io.github.l_raider.rapidchecksum.svg /app/share/icons/hicolor/scalable/apps/io.github.l_raider.rapidchecksum.svg
      - for size in 16 32 48 64 128 256 512; do
          install -Dm644
            "flatpak/icons/hicolor/${size}x${size}/apps/io.github.l_raider.rapidchecksum.png"
            "/app/share/icons/hicolor/${size}x${size}/apps/io.github.l_raider.rapidchecksum.png";
        done
    sources:
      # Project source including the pre-vendored crate directory.
      # flatpak/vendor/ and flatpak/cargo-vendor-config.toml are generated
      # locally by build-flatpak.sh (cargo vendor) and not committed to git.
      - type: dir
        path: ..
        skip:
          - .git/
          - target/
          - flatpak/.flatpak-builder/
          - flatpak/build/
          - flatpak/repo/
